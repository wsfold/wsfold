name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Publish GitHub Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.14.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: wsfold/homebrew-wsfold
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew Formula
        env:
          VERSION_TAG: ${{ github.ref_name }}
          SOURCE_REPO: ${{ github.repository }}
          CHECKSUMS_FILE: dist/checksums.txt
        run: |
          chmod +x ./scripts/update-homebrew-tap.sh
          ./scripts/update-homebrew-tap.sh homebrew-tap

      - name: Publish Homebrew Tap Update
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          cd homebrew-tap
          if git diff --quiet -- Formula/wsfold.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git config user.name "wsfold release bot"
          git config user.email "actions@github.com"
          git add Formula/wsfold.rb
          git commit -m "Update wsfold to ${VERSION_TAG}"
          git push origin HEAD:main
